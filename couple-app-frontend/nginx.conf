# ─────────────────────────────────────────────────────────────────────────────
# Nginx production config for PAIRA
#
# Handles:
#   • Serving the React SPA from /usr/share/nginx/html
#   • Reverse-proxying /api/*      → backend (FastAPI)
#   • Reverse-proxying /ws/*       → backend (WebSocket upgrade)
#   • Reverse-proxying /static/*   → backend (profile pics etc.)
#   • Reverse-proxying /upload/*   → backend (media uploads)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Client body / file upload limits ─────────────────────────────────────
    client_max_body_size 100M;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── REST API proxy ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket proxy (chat + video-call) ───────────────────────────────────
    location /ws/ {
        proxy_pass             http://api:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "Upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     86400s;   # keep WS alive
        proxy_send_timeout     86400s;
    }

    # ── Backend static files (profile pics, thumbnails) ───────────────────────
    location /static/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Media upload files ────────────────────────────────────────────────────
    location /upload/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── React SPA (catch-all) ─────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
